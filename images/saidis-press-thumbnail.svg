    <text x="0" y="72" font-family="Spectral, Georgia, serif" font-size="58" font-weight="700">Prevención del suicidio</text>
    <text x="0" y="132" font-family="Ubuntu, Arial, sans-serif" font-size="34" font-weight="500" fill="#1a6b2f">Inteligencia artificial clínica</text>
    <text x="0" y="202" font-family="Ubuntu, Arial, sans-serif" font-size="25" fill="#2d4a30">Sistema inteligente de alerta para apoyar</text>
    <text x="0" y="238" font-family="Ubuntu, Arial, sans-serif" font-size="25" fill="#2d4a30">la detección temprana de intentos severos.</text>
