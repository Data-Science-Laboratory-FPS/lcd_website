    <path d="M156 84c-39 0-70 30-70 67 0 51 52 76 70 116 18-40 70-65 70-116 0-37-31-67-70-67z" fill="#1a6b2f" opacity="0.92"/>
    <path d="M122 154h36v-36h24v36h36v24h-36v36h-24v-36h-36z" fill="#ffffff"/>
