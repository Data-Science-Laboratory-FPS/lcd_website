<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">SAIDIS press thumbnail</title>
  <desc id="desc">Abstract healthcare and artificial intelligence illustration for SAIDIS suicide prevention press items.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f0f7f0"/>
      <stop offset="0.52" stop-color="#d8efe0"/>
      <stop offset="1" stop-color="#bfe6d2"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#e8f5e9" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#1a6b2f" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1010" cy="110" r="190" fill="#9dd6bf" opacity="0.38"/>
  <circle cx="160" cy="575" r="250" fill="#007932" opacity="0.10"/>
  <g stroke="#1a6b2f" stroke-width="5" opacity="0.22" fill="none">
    <path d="M155 210h140l64-78 72 178 67-100h170"/>
    <path d="M735 455h118l42-52 47 118 45-66h120"/>
  </g>
  <g filter="url(#shadow)">
